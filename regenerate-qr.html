<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouveau QR code — Photos Foot Club</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="pennant-header">
    <img src="assets/logo.png" alt="A.S. Valognes" class="club-logo">
    <p class="pennant-header__title">Photos foot club</p>
    <p class="pennant-header__subtitle">A.S. Valognes</p>
  </header>

  <main class="page-shell">
    <div class="card">
      <h1>Nouveau QR code</h1>
      <p class="lede">
        Téléphone perdu, cassé, ou QR code égaré ? Reconnecte-toi avec ton
        email et ton mot de passe pour recevoir un nouveau QR code par email.
        <strong>L'ancien cessera immédiatement de fonctionner.</strong>
      </p>

      <div id="status-message" class="status-message"></div>

      <form id="regenerate-form">
        <label for="email">Adresse email</label>
        <input type="email" id="email" name="email" required autocomplete="email">

        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">

        <button type="submit" class="btn-primary" id="submit-btn">Recevoir mon nouveau QR code</button>
      </form>

      <p class="form-footer">
        <a href="index.html">Retour à la connexion</a>
      </p>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    const form = document.getElementById("regenerate-form");
    const statusMessage = document.getElementById("status-message");
    const submitBtn = document.getElementById("submit-btn");

    function showStatus(message, type) {
      statusMessage.textContent = message;
      statusMessage.className = `status-message visible status-${type}`;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      statusMessage.className = "status-message";
      submitBtn.disabled = true;
      submitBtn.textContent = "Envoi en cours...";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      try {
        const result = await api.regenerateQrToken(email, password);
        showStatus(result.message || "Nouveau QR code envoyé par email.", "success");
        form.reset();
        submitBtn.disabled = false;
        submitBtn.textContent = "Recevoir mon nouveau QR code";
      } catch (error) {
        showStatus(error.message, "error");
        submitBtn.disabled = false;
        submitBtn.textContent = "Recevoir mon nouveau QR code";
      }
    });
  </script>

</body>
</html>
