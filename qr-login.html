<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion rapide — Photos Foot Club</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="pennant-header">
    <img src="assets/logo.png" alt="A.S. Valognes" class="club-logo">
    <p class="pennant-header__title">Photos foot club</p>
    <p class="pennant-header__subtitle">A.S. Valognes</p>
  </header>

  <main class="page-shell">
    <div class="card centered-text">

      <div id="loading-view">
        <h1>Connexion en cours</h1>
        <div class="spinner"></div>
        <p class="lede">On te reconnecte automatiquement...</p>
      </div>

      <div id="error-view" style="display: none;">
        <h1>Connexion impossible</h1>
        <p class="lede" id="error-text">Ce QR code n'est pas valide.</p>
        <a href="index.html"><button type="button" class="btn-secondary">Se connecter avec mon mot de passe</button></a>
      </div>

    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (async function () {
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");

      const loadingView = document.getElementById("loading-view");
      const errorView = document.getElementById("error-view");
      const errorText = document.getElementById("error-text");

      if (!token) {
        loadingView.style.display = "none";
        errorView.style.display = "block";
        return;
      }

      try {
        const result = await api.qrLogin(token);
        auth.saveSession(result.session_token, result.email, result.role);
        window.location.href = "upload.html";
      } catch (error) {
        loadingView.style.display = "none";
        errorText.textContent = error.message;
        errorView.style.display = "block";
      }
    })();
  </script>

</body>
</html>
